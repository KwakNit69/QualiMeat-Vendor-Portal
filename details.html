<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QualiMeat - Stall Details</title>
    <link rel="stylesheet" href="css/details.css">
</head>
<body class="details-body">

    <header class="app-bar">
        <button onclick="window.location.href='index.html'">← BACK</button>
        <div class="logo">🥩 QualiMeat</div>
    </header>

    <main class="main-layout">

        <!-- Vendor Profile -->
        <section class="side-panel vendor-info-panel">
            <div class="profile-header">
                <img id="stall-img" src="" alt="Stall">
                <h2 id="stall-name">Loading...</h2>
                <p id="stall-owner"></p>

                <div class="vendor-stats">
                    <div class="mini-stat">
                        <span id="totalSessions">0</span>
                        <small>Sessions</small>
                    </div>
                    <div class="mini-stat danger">
                        <span id="flaggedSessions">0</span>
                        <small>Flagged</small>
                    </div>
                </div>
            </div>
        </section>

        <!-- Logs -->
        <section class="log-container">
            <div id="statusSummary" class="status-summary">
                <h3>Analyzing vendor status...</h3>
            </div>

            <h3>Official Inspection Logs</h3>
            <div id="cert-grid"></div>
        </section>
    </main>

    <script type="module" src="js/certificates.js"></script>
</body>
</html>
