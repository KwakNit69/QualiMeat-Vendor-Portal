<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QualiMeat - Stall Details</title>
    <link rel="stylesheet" href="css/details.css">
</head>
<body class="details-body">
    <header class="app-bar">
        <button class="back-btn" onclick="window.location.href='index.html'">
            ← Back
        </button>
        <div class="logo">🥩 QualiMeat</div>
    </header>

<main class="details-layout">

    <!-- FULL WIDTH HERO -->
    <section class="vendor-summary-card">
        <div class="vendor-left">
            <img id="stall-img" src="" alt="Vendor Stall">
            <div>
                <h2 id="stall-name">Loading...</h2>
                <p id="stall-owner"></p>
            </div>
        </div>

        <div class="summary-stats">
            <div class="stat-box">
                <span id="totalSessions">0</span>
                <small>Sessions</small>
            </div>
            <div class="stat-box flagged">
                <span id="flaggedSessions">0</span>
                <small>Flagged</small>
            </div>
        </div>
    </section>

    <!-- WARNING -->
    <section id="warningBox"></section>

    <!-- LOGS -->
    <section class="logs-section">
        <h3>Official Inspection Logs</h3>
        <div id="cert-grid" class="logs-grid"></div>
    </section>

</main>

    <script type="module" src="js/certificates.js"></script>
</body>
</html>
