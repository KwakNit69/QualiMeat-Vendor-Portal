<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>QualiMeat - Warning Center</title>
  <link rel="stylesheet" href="css/warnings.css" />
</head>
<body>

  <header class="topbar">
    <button class="back-btn" onclick="window.location.href='index.html'">
      ← Dashboard
    </button>
    <div class="logo">⚠ QualiMeat <span>Warning Center</span></div>
  </header>

  <main class="warning-layout">
    <section class="warning-summary">
      <div class="summary-card">
        <span>Total Flagged Sessions</span>
        <h2 id="flagged-count">0</h2>
      </div>
    </section>

    <section class="warning-list-section">
      <h2>Flagged Inspection Sessions</h2>
      <div id="warning-list" class="warning-list"></div>
    </section>
  </main>

  <script type="module" src="js/warnings.js"></script>
</body>
</html>
